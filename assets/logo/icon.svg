<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Pink background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF6EB4"/>
      <stop offset="0.55" stop-color="#E91E8C"/>
      <stop offset="1" stop-color="#B5006E"/>
    </linearGradient>
    <!-- Heart gradient -->
    <linearGradient id="heart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF4081"/>
      <stop offset="1" stop-color="#E91E8C"/>
    </linearGradient>
    <!-- Soft drop shadow for the tile -->
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#5A0033" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Full-bleed background (iOS masks the corners) -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>

  <!-- The game tile -->
  <rect x="96" y="92" width="320" height="320" rx="52" fill="#FFFFFF" filter="url(#tileShadow)"/>
  <!-- subtle inner top highlight -->
  <rect x="96" y="92" width="320" height="320" rx="52" fill="none" stroke="#FFE3F1" stroke-width="4"/>

  <!-- Heart, centered on the tile -->
  <g transform="translate(136,104) scale(10)">
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
          fill="url(#heart)"/>
  </g>

  <!-- Point value in the tile corner, WWF style -->
  <text x="392" y="388" text-anchor="end" font-family="Arial, Helvetica, sans-serif"
        font-size="52" font-weight="700" fill="#B5006E">8</text>
</svg>
