[build]
  # build:web = generate icons -> expo export -> inject PWA/iOS meta tags.
  # A bare `expo export` would ship without the manifest/apple-touch-icon tags.
  command = "npm run build:web"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # These env vars are public-by-design and MUST appear in the client bundle:
  #   SUPABASE_URL      — public project URL embedded in src/supabase/config.ts
  #   VAPID_PUBLIC_KEY  — public half of the Web Push keypair, embedded in
  #                       src/utils/pushSubscription.ts
  # Netlify's secrets scanner would otherwise fail every deploy on these.
  # NEVER add VAPID_PRIVATE_KEY or SUPABASE_SERVICE_KEY here — those are real
  # secrets and must not appear in build output.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,VAPID_PUBLIC_KEY"

[functions]
  directory = "netlify/functions"
  node_bundler = "nft"

# Finished-game analysis export. Keep these ahead of the SPA fallback.
[[redirects]]
  from = "/api/games/:gameId/analysis-token"
  to = "/.netlify/functions/game-analysis-token?gameId=:gameId"
  status = 200
  force = true

[[redirects]]
  from = "/api/game-analysis"
  to = "/.netlify/functions/game-analysis"
  status = 200
  force = true

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
