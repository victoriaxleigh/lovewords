[build]
  command = "npx expo export --platform web"
  publish = "dist"
  ignore = "exit 1"

[build.environment]
  # These env vars are public-by-design and MUST appear in the client bundle:
  #   SUPABASE_URL      — public project URL embedded in src/supabase/config.ts
  #   VAPID_PUBLIC_KEY  — public half of the Web Push keypair, embedded in
  #                       src/utils/pushSubscription.ts
  # Netlify's secrets scanner would otherwise fail every deploy on these.
  # NEVER add VAPID_PRIVATE_KEY or SUPABASE_SERVICE_KEY here — those are real
  # secrets and must not appear in build output.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,VAPID_PUBLIC_KEY"

[functions]
  directory = "netlify/functions"
  node_bundler = "nft"

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
